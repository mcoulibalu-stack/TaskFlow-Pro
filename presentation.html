<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow Pro - Présentation Complète</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        /* =============================================
           STYLES COMPLETS DE LA PRÉSENTATION
           ============================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: #0a0e1a;
            color: #e2e8f0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== BARRE D'OUTILS ===== */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            margin-bottom: 24px;
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .toolbar-left .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .toolbar-left .logo i {
            -webkit-text-fill-color: initial;
            color: #a78bfa;
        }

        .toolbar-left .slide-counter {
            color: #94a3b8;
            font-size: 0.85rem;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
        }

        .toolbar-right {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-tool {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.04);
            color: #e2e8f0;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-tool:hover {
            background: rgba(102, 126, 234, 0.15);
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .btn-tool.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
            color: white;
        }

        .btn-tool.primary:hover {
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-tool i {
            font-size: 0.9rem;
        }

        /* ===== NAVIGATION DES SLIDES ===== */
        .slide-nav {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .slide-nav button {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #e2e8f0;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .slide-nav button:hover {
            background: rgba(102, 126, 234, 0.15);
        }

        .slide-nav .dots {
            display: flex;
            gap: 6px;
            flex: 1;
            justify-content: center;
            flex-wrap: wrap;
        }

        .slide-nav .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            padding: 0;
            flex-shrink: 0;
        }

        .slide-nav .dot.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            transform: scale(1.3);
        }

        .slide-nav .dot:hover {
            background: rgba(102, 126, 234, 0.4);
        }

        .slide-nav .nav-info {
            color: #94a3b8;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        /* ===== SLIDES ===== */
        .slides-container {
            position: relative;
        }

        .slide {
            display: none;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 50px 60px;
            min-height: 450px;
            animation: fadeSlide 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .slide.active {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .slide::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.04), transparent);
            border-radius: 50%;
            pointer-events: none;
        }

        .slide-number {
            position: absolute;
            bottom: 16px;
            right: 24px;
            color: rgba(255, 255, 255, 0.06);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .slide-badge {
            display: inline-block;
            padding: 3px 14px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            background: rgba(102, 126, 234, 0.1);
            color: #a78bfa;
            margin-bottom: 10px;
        }

        .slide-badge.gold {
            background: rgba(246, 211, 101, 0.1);
            color: #f6d365;
        }

        .slide-badge.green {
            background: rgba(52, 211, 153, 0.1);
            color: #34d399;
        }

        .slide-badge.rose {
            background: rgba(244, 63, 94, 0.1);
            color: #f43f5e;
        }

        .slide-title {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }

        .slide-title.gold {
            background: linear-gradient(135deg, #f6d365, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .slide-title.green {
            background: linear-gradient(135deg, #34d399, #059669);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .slide-title.rose {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .slide-subtitle {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 24px;
            font-weight: 300;
        }

        .slide-content {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #e2e8f0;
            position: relative;
            z-index: 1;
        }

        /* ===== COMPOSANTS ===== */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 16px;
        }

        .slide-content ul {
            list-style: none;
            padding: 0;
        }

        .slide-content ul li {
            padding: 5px 0;
            padding-left: 28px;
            position: relative;
        }

        .slide-content ul li::before {
            content: "▸";
            position: absolute;
            left: 0;
            color: #a78bfa;
        }

        .slide-content ul li.checked::before {
            content: "✅";
        }

        .slide-content ul li.star::before {
            content: "⭐";
        }

        .slide-content ul li.warning::before {
            content: "⚠️";
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            padding: 18px 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-3px);
        }

        .card .icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
            display: block;
        }

        .card h4 {
            color: #e2e8f0;
            font-size: 0.95rem;
            margin-bottom: 3px;
        }

        .card p {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .card .number {
            font-size: 2.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
        }

        .tech-tag {
            display: inline-block;
            padding: 4px 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 30px;
            margin: 3px;
            font-size: 0.8rem;
            color: #94a3b8;
            transition: all 0.3s ease;
        }

        .tech-tag:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #e2e8f0;
        }

        .color-dots {
            display: flex;
            gap: 8px;
            margin: 8px 0;
        }

        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .code-block {
            background: rgba(0, 0, 0, 0.3);
            padding: 14px 18px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #94a3b8;
            line-height: 1.6;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .highlight {
            background: rgba(102, 126, 234, 0.08);
            padding: 2px 10px;
            border-radius: 4px;
            border: 1px solid rgba(102, 126, 234, 0.08);
        }

        .separator {
            width: 60px;
            height: 3px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 4px;
            margin: 16px 0;
        }

        /* ===== SLIDE CENTRÉE ===== */
        .slide-center {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 450px;
        }

        .slide-center.active {
            display: flex;
        }

        .slide-center .slide-title {
            font-size: 3.6rem;
        }

        .slide-center .big-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
        }

        /* ===== BARRE DE PROGRESSION ===== */
        .progress-bar-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255, 255, 255, 0.04);
            z-index: 200;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: width 0.5s ease;
            width: 0%;
        }

        /* ===== FOOTER ===== */
        .footer-presentation {
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
            padding: 24px 0 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            margin-top: 24px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 992px) {
            .slide {
                padding: 35px 30px;
            }
            .grid-2,
            .grid-3,
            .grid-4 {
                grid-template-columns: 1fr 1fr;
            }
            .slide-title {
                font-size: 2rem;
            }
            .slide-center .slide-title {
                font-size: 2.4rem;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            .slide {
                padding: 24px 18px;
                min-height: 300px;
            }
            .slide-title {
                font-size: 1.5rem;
            }
            .slide-center .slide-title {
                font-size: 1.8rem;
            }
            .grid-2,
            .grid-3,
            .grid-4 {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .toolbar {
                flex-direction: column;
                align-items: stretch;
                padding: 12px 16px;
            }
            .toolbar-right {
                justify-content: center;
            }
            .btn-tool {
                padding: 6px 14px;
                font-size: 0.75rem;
            }
            .slide-nav {
                justify-content: center;
                gap: 8px;
                padding: 8px 12px;
            }
            .slide-nav .dots {
                order: 3;
                flex-basis: 100%;
                justify-content: center;
                gap: 4px;
            }
            .slide-number {
                display: none;
            }
            .slide-content {
                font-size: 0.95rem;
            }
            .code-block {
                font-size: 0.7rem;
                padding: 10px 12px;
            }
            .color-dot {
                width: 24px;
                height: 24px;
            }
            .card .number {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .slide {
                padding: 18px 14px;
                min-height: 250px;
                border-radius: 16px;
            }
            .slide-title {
                font-size: 1.2rem;
            }
            .slide-center .slide-title {
                font-size: 1.5rem;
            }
            .slide-center .big-icon {
                font-size: 2.5rem;
            }
            .slide-badge {
                font-size: 0.55rem;
                padding: 2px 10px;
            }
            .toolbar-left .logo {
                font-size: 1rem;
            }
            .btn-tool {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
            .slide-nav button {
                padding: 4px 10px;
                font-size: 0.75rem;
            }
            .slide-nav .dot {
                width: 8px;
                height: 8px;
            }
        }

        /* ===== IMPRESSION ===== */
        @media print {
            .toolbar,
            .slide-nav,
            .progress-bar-container {
                display: none !important;
            }
            .slide {
                display: block !important;
                page-break-after: always;
                border: none;
                background: white !important;
                color: #1a202c !important;
                padding: 40px !important;
                min-height: 100vh !important;
                border-radius: 0 !important;
            }
            .slide .slide-title {
                -webkit-text-fill-color: #667eea !important;
                color: #667eea !important;
                background: none !important;
            }
            .slide .slide-content {
                color: #1a202c !important;
            }
            .slide .slide-content .card {
                background: #f7fafc !important;
                border-color: #e2e8f0 !important;
            }
            .slide .slide-content .card h4 {
                color: #1a202c !important;
            }
            .slide .slide-content .card p {
                color: #4a5568 !important;
            }
            .slide .slide-content ul li {
                color: #1a202c !important;
            }
            .slide-center .slide-title {
                -webkit-text-fill-color: #f6d365 !important;
                color: #f6d365 !important;
            }
            body {
                background: white !important;
                padding: 0 !important;
            }
            .slide::before {
                display: none !important;
            }
            .slide-number {
                color: #cbd5e0 !important;
            }
            .code-block {
                background: #f7fafc !important;
                color: #2d3748 !important;
                border: 1px solid #e2e8f0 !important;
            }
            .footer-presentation {
                color: #a0aec0 !important;
                border-color: #e2e8f0 !important;
            }
            .tech-tag {
                background: #f7fafc !important;
                border-color: #e2e8f0 !important;
                color: #4a5568 !important;
            }
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 60px;
            color: #94a3b8;
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- ===== BARRE D'OUTILS ===== -->
    <div class="toolbar">
        <div class="toolbar-left">
            <span class="logo"><i class="fas fa-check-double"></i> TaskFlow <span style="-webkit-text-fill-color:initial;color:#f6d365;">Pro</span></span>
            <span class="slide-counter" id="slideCounter">1 / 30</span>
        </div>
        <div class="toolbar-right">
            <button class="btn-tool" onclick="exportPDF()">
                <i class="fas fa-file-pdf"></i> PDF
            </button>
            <button class="btn-tool" onclick="printPresentation()">
                <i class="fas fa-print"></i> Imprimer
            </button>
            <button class="btn-tool primary" onclick="fullscreen()">
                <i class="fas fa-expand"></i> Plein écran
            </button>
        </div>
    </div>

    <!-- ===== NAVIGATION ===== -->
    <div class="slide-nav">
        <button onclick="prevSlide()"><i class="fas fa-chevron-left"></i></button>
        <span class="nav-info" id="navInfo">Slide 1/30</span>
        <div class="dots" id="dotsContainer"></div>
        <button onclick="nextSlide()"><i class="fas fa-chevron-right"></i></button>
    </div>

    <!-- ===== SLIDES ===== -->
    <div class="slides-container" id="slidesContainer">
        <div class="loading">
            <div class="spinner"></div>
            <p>Chargement de la présentation...</p>
        </div>
    </div>

    <div class="footer-presentation">
        TaskFlow Pro - Groupe 5 - 2025
    </div>
</div>

<!-- ===== BARRE DE PROGRESSION ===== -->
<div class="progress-bar-container">
    <div class="progress-bar-fill" id="progressBar"></div>
</div>

<script>
    // ============================================================
    // DONNÉES COMPLÈTES DE LA PRÉSENTATION
    // ============================================================
    const slidesData = [
        // =========================================================
        // SECTION 1 : PAGE DE GARDE
        // =========================================================
        {
            type: 'center',
            badge: null,
            title: 'TaskFlow Pro',
            subtitle: 'Application Web de Gestion de Tâches',
            content: `
                <div class="separator" style="margin:16px auto;"></div>
                <div style="font-size:1.6rem;font-weight:700;color:#e2e8f0;margin:12px 0;">GROUPE 5</div>
                <div style="color:#94a3b8;font-size:1.1rem;">Présentation du projet</div>
                <div style="color:#94a3b8;font-size:1rem;margin-top:4px;">2025</div>
            `,
            icon: '🚀'
        },

        // =========================================================
        // SECTION 2 : SOMMAIRE
        // =========================================================
        {
            type: 'normal',
            badge: 'Plan',
            title: 'SOMMAIRE',
            content: `
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 30px;font-size:1.1rem;">
                    <div><strong style="color:#a78bfa;">1.</strong> Page de garde</div>
                    <div><strong style="color:#a78bfa;">2.</strong> Sommaire</div>
                    <div><strong style="color:#a78bfa;">3.</strong> Présentation du projet</div>
                    <div><strong style="color:#a78bfa;">4.</strong> Objectifs</div>
                    <div><strong style="color:#a78bfa;">5.</strong> Technologies utilisées</div>
                    <div><strong style="color:#a78bfa;">6.</strong> Architecture</div>
                    <div><strong style="color:#a78bfa;">7.</strong> Dashboard</div>
                    <div><strong style="color:#a78bfa;">8.</strong> Ajout de tâche</div>
                    <div><strong style="color:#a78bfa;">9.</strong> Liste des tâches</div>
                    <div><strong style="color:#a78bfa;">10.</strong> Filtres & Recherche</div>
                    <div><strong style="color:#a78bfa;">11.</strong> Design & UX</div>
                    <div><strong style="color:#a78bfa;">12.</strong> Démonstration</div>
                    <div><strong style="color:#a78bfa;">13.</strong> Difficultés</div>
                    <div><strong style="color:#a78bfa;">14.</strong> Améliorations</div>
                    <div><strong style="color:#a78bfa;">15.</strong> Conclusion</div>
                    <div><strong style="color:#a78bfa;">16.</strong> Merci</div>
                </div>
            `
        },

        // =========================================================
        // SECTION 3 : PRÉSENTATION
        // =========================================================
        {
            type: 'normal',
            badge: 'Introduction',
            title: 'PRÉSENTATION DU PROJET',
            content: `
                <div class="grid-2">
                    <div>
                        <div style="color:#a78bfa;font-weight:600;font-size:0.9rem;">📌 Définition</div>
                        <p style="color:#94a3b8;font-size:0.95rem;">Application web de gestion de tâches permettant à un utilisateur de créer, organiser, prioriser et suivre ses activités quotidiennes ou professionnelles.</p>
                    </div>
                    <div>
                        <div style="color:#f6d365;font-weight:600;font-size:0.9rem;">🎯 Problématique</div>
                        <p style="color:#94a3b8;font-size:0.95rem;">Comment améliorer la productivité personnelle à travers un outil numérique intuitif et accessible ?</p>
                    </div>
                    <div style="grid-column:1/-1;">
                        <div style="color:#34d399;font-weight:600;font-size:0.9rem;">👥 Public cible</div>
                        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:6px;">
                            <span class="tech-tag">👤 Particuliers</span>
                            <span class="tech-tag">💼 Professionnels</span>
                            <span class="tech-tag">🎓 Étudiants</span>
                            <span class="tech-tag">🏢 Équipes</span>
                        </div>
                    </div>
                </div>
            `
        },

        // =========================================================
        // SECTION 4 : OBJECTIFS
        // =========================================================
        {
            type: 'normal',
            badge: 'Objectifs',
            title: 'OBJECTIFS DU PROJET',
            content: `
                <div class="grid-2">
                    <div>

    // ============================================================
    // LOGIQUE DE LA PRÉSENTATION
    // ============================================================
    let currentSlide = 0;
    const totalSlides = slidesData.length;

    function renderSlides() {
        const container = document.getElementById('slidesContainer');
        const dotsContainer = document.getElementById('dotsContainer');

        let html = '';
        let dotsHtml = '';

        slidesData.forEach((slide, index) => {
            const isActive = index === 0 ? 'active' : '';
            const typeClass = slide.type === 'center' ? 'slide-center' : '';
            const icon = slide.icon ? `<div class="big-icon">${slide.icon}</div>` : '';
            const badgeClass = slide.badge ? getBadgeClass(index) : '';

            html += `
                <div class="slide ${isActive} ${typeClass}" data-index="${index}">
                    ${slide.badge ? `<span class="slide-badge ${badgeClass}">${slide.badge}</span>` : ''}
                    <div class="slide-title ${['gold','green','rose'][index % 3] || ''}">${slide.title}</div>
                    ${slide.subtitle ? `<div class="slide-subtitle">${slide.subtitle}</div>` : ''}
                    <div class="slide-content">
                        ${icon}
                        ${slide.content}
                    </div>
                    <span class="slide-number">${index + 1} / ${totalSlides}</span>
                </div>
            `;

            const dotActive = index === 0 ? 'active' : '';
            dotsHtml += `<button class="dot ${dotActive}" onclick="goToSlide(${index})" aria-label="Slide ${index+1}"></button>`;
        });

        container.innerHTML = html;
        dotsContainer.innerHTML = dotsHtml;
        updateUI();
    }

    function getBadgeClass(index) {
        const classes = ['', 'gold', 'green', 'rose', '', 'gold', 'green', 'rose', '', 'gold'];
        return classes[index % classes.length] || '';
    }

    function showSlide(index) {
        const slides = document.querySelectorAll('.slide');
        const dots = document.querySelectorAll('.dot');

        slides.forEach((slide, i) => {
            slide.classList.toggle('active', i === index);
        });

        dots.forEach((dot, i) => {
            dot.classList.toggle('active', i === index);
        });

        currentSlide = index;
        updateUI();
    }

    function updateUI() {
        document.getElementById('slideCounter').textContent = `${currentSlide + 1} / ${totalSlides}`;
        document.getElementById('navInfo').textContent = `Slide ${currentSlide + 1}/${totalSlides}`;
        document.getElementById('progressBar').style.width = `${((currentSlide + 1) / totalSlides) * 100}%`;
    }

    function nextSlide() {
        const next = (currentSlide + 1) % totalSlides;
        showSlide(next);
    }

    function prevSlide() {
        const prev = (currentSlide - 1 + totalSlides) % totalSlides;
        showSlide(prev);
    }

    function goToSlide(index) {
        showSlide(index);
    }

    function fullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        } else {
            document.exitFullscreen().catch(() => {});
        }
    }

    function printPresentation() {
        window.print();
    }

    function exportPDF() {
        window.print();
    }

    // ============================================================
    // RACCOURCIS CLAVIER
    // ============================================================
    document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
            e.preventDefault();
            nextSlide();
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            e.preventDefault();
            prevSlide();
        } else if (e.key === 'f' || e.key === 'F') {
            fullscreen();
        } else if (e.key === 'Escape') {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        } else if (e.key >= '1' && e.key <= '9') {
            const num = parseInt(e.key) - 1;
            if (num < totalSlides) {
                goToSlide(num);
            }
        }
    });

    // ============================================================
